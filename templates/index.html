<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">


    <h1>Student Performance Predictor</h1>

    <form method="POST">

       <label>Study Hours</label><br>
<input
    type="number"
    name="study_hours"
    step="0.1"vjh
    placeholder="Enter study hours"
    required
><br><br>

<label>Attendance</label><br>
<input
    type="number"
    name="attendance"
    step="0.1"
    placeholder="Attendance (%)"
    required
><br><br>

<label>Assignments Completed</label><br>
<input
    type="number"
    name="assignments"
    step="1"
    placeholder="Assignments Completed"
    required
><br><br>

        <button type="submit">Predict</button>

    </form>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    {% if prediction %}

        <div class="result">

              <h2>Predicted Marks: {{ prediction }}</h2>

              <h2>Performance: {{ performance }}</h2>

        </div>

    {% endif %}
</div>    

</body>
</html>
