<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">


    <h1>Student Performance Predictor</h1>

    <form method="POST">

        <label>Study Hours</label><br>
        <input type="number" step="0.1" name="study_hours" required><br><br>

        <label>Attendance</label><br>
        <input type="number" step="0.1" name="attendance" required><br><br>

        <label>Assignments Completed</label><br>
        <input type="number" step="0.1" name="assignments" required><br><br>

        <button type="submit">Predict</button>

    </form>

    {% if prediction %}

        <div class="result">

              <h2>Predicted Marks: {{ prediction }}</h2>

              <h2>Performance: {{ performance }}</h2>

        </div>

    {% endif %}
</div>    

</body>
</html>
